<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поликлиника - Электронная регистратура</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>🏥 Поликлиника</h1>
                
            </div>
            <div class="header-right">
                <button id="homeBtn">Главная</button>
                <div id="authButtons">
                    <button id="loginBtn">Вход</button>
                    <button id="registerBtn">Регистрация</button>
                </div>
                <div id="userMenu" style="display: none;">
                    <button id="profileBtn">Профиль</button>
                    <button id="appointmentsBtn">Мои записи</button>
                    <button id="medicalRecordBtn" style="display: none;">Медкарта</button>
                    <button id="logoutBtn">Выход</button>
                    <span id="userName" class="user-name"></span>
                </div>
            </div>
        </header>
        <main id="app">
            <div class="loading">Загрузка...</div>
        </main>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
